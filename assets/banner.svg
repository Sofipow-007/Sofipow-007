<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1200 200">
  <defs>

    <!-- Animaciones esenciales -->

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a1a"/>
      <stop offset="45%"  stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1f38"/>
    </linearGradient>

    <!-- <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient> -->

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#a78bfa"/>
      <stop offset="70%"  stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#818cf8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#67e8f9" stop-opacity="0.10"/>
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.10"/>
    </linearGradient>

    <clipPath id="bounds">
      <rect width="1200" height="200" rx="16"/>
    </clipPath>

    <style>
      @keyframes f1 {
        0%,100% { transform:translateY(0) translateX(0); opacity:.7; }
        33%      { transform:translateY(-16px) translateX(7px); opacity:1; }
        66%      { transform:translateY(-7px) translateX(-5px); opacity:.45; }
      }
      @keyframes f2 {
        0%,100% { transform:translateY(0) translateX(0); opacity:.5; }
        40%      { transform:translateY(13px) translateX(-9px); opacity:.9; }
        70%      { transform:translateY(-9px) translateX(11px); opacity:.35; }
      }
      @keyframes f3 {
        0%,100% { transform:translateY(0); opacity:.6; }
        50%      { transform:translateY(-20px); opacity:1; }
      }
      @keyframes shimmer {
        0%,100% { opacity:1; }
        50%      { opacity:.78; }
      }
      @keyframes waveMove {
        from { transform:translateX(0); }
        to   { transform:translateX(-1200px); }
      }
      .p1  { animation:f1 5.2s ease-in-out infinite; }
      .p2  { animation:f2 6.8s ease-in-out infinite; }
      .p3  { animation:f3 4.1s ease-in-out infinite; }
      .p4  { animation:f1 7.3s ease-in-out infinite 1s; }
      .p5  { animation:f2 5.7s ease-in-out infinite 0.5s; }
      .p6  { animation:f3 6.2s ease-in-out infinite 1.5s; }
      .p7  { animation:f1 4.6s ease-in-out infinite 2s; }
      .p8  { animation:f2 7.8s ease-in-out infinite 0.8s; }
      .p9  { animation:f3 5.3s ease-in-out infinite 2.5s; }
      .p10 { animation:f1 6.1s ease-in-out infinite 1.2s; }
      .p11 { animation:f2 4.9s ease-in-out infinite 0.3s; }
      .p12 { animation:f3 5.9s ease-in-out infinite 1.8s; }
      .p13 { animation:f1 6.5s ease-in-out infinite 0.7s; }
      .p14 { animation:f2 5.0s ease-in-out infinite 2.2s; }
      .p15 { animation:f3 7.0s ease-in-out infinite 1.0s; }
      .name-text { animation:shimmer 3.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="200" rx="16" fill="url(#bg)"/>

  <g clip-path="url(#bounds)">

    <!-- Orbes enormes y livianas -->
    <circle cx="980" cy="40"  r="160" fill="#4f46e5" opacity="0.10"/>
    <circle cx="220" cy="180" r="130" fill="#0891b2" opacity="0.09"/>
    <circle cx="600" cy="100" r="200" fill="#6d28d9" opacity="0.06"/>
    <circle cx="50"  cy="60"  r="80"  fill="#7c3aed" opacity="0.08"/>

    <!-- Pequeñas partículas -->
    <circle class="p1"  cx="60"   cy="38"  r="2.5" fill="#c4b5fd" opacity="0.85"/>
    <circle class="p2"  cx="145"  cy="115" r="2"   fill="#67e8f9" opacity="0.75"/>
    <circle class="p3"  cx="230"  cy="28"  r="2.5" fill="#a78bfa" opacity="0.90"/>
    <circle class="p4"  cx="320"  cy="140" r="2"   fill="#c4b5fd" opacity="0.65"/>
    <circle class="p5"  cx="400"  cy="52"  r="3"   fill="#67e8f9" opacity="0.80"/>
    <circle class="p6"  cx="475"  cy="150" r="2"   fill="#a78bfa" opacity="0.70"/>
    <circle class="p7"  cx="555"  cy="28"  r="2.5" fill="#c4b5fd" opacity="0.90"/>
    <circle class="p8"  cx="630"  cy="130" r="2"   fill="#67e8f9" opacity="0.60"/>
    <circle class="p9"  cx="700"  cy="55"  r="3"   fill="#a78bfa" opacity="0.80"/>
    <circle class="p10" cx="775"  cy="110" r="2"   fill="#c4b5fd" opacity="0.70"/>
    <circle class="p11" cx="840"  cy="22"  r="2.5" fill="#67e8f9" opacity="0.90"/>
    <circle class="p12" cx="90"   cy="80"  r="2"   fill="#a78bfa" opacity="0.65"/>
    <circle class="p13" cx="920"  cy="95"  r="2.5" fill="#c4b5fd" opacity="0.75"/>
    <circle class="p14" cx="1020" cy="38"  r="2"   fill="#67e8f9" opacity="0.80"/>
    <circle class="p15" cx="1110" cy="130" r="2.5" fill="#a78bfa" opacity="0.70"/>

    <!-- Particulas centrales -->
    <circle class="p2"  cx="175"  cy="62"  r="4"   fill="#7c3aed" opacity="0.35"/>
    <circle class="p4"  cx="510"  cy="95"  r="3.5" fill="#0891b2" opacity="0.30"/>
    <circle class="p6"  cx="750"  cy="72"  r="4"   fill="#7c3aed" opacity="0.35"/>
    <circle class="p8"  cx="360"  cy="20"  r="3"   fill="#0891b2" opacity="0.28"/>
    <circle class="p10" cx="270"  cy="155" r="3.5" fill="#7c3aed" opacity="0.32"/>
    <circle class="p12" cx="870"  cy="45"  r="4"   fill="#0891b2" opacity="0.30"/>
    <circle class="p14" cx="1060" cy="115" r="3.5" fill="#7c3aed" opacity="0.28"/>
    <circle class="p1"  cx="1150" cy="55"  r="3"   fill="#0891b2" opacity="0.30"/>

    <!-- Acento -->
    <line x1="200" y1="145" x2="1000" y2="145" stroke="url(#lineGrad)" stroke-width="1" opacity="0.6"/>

    <!-- Configuración waves -->
    <g>
      <g style="animation:waveMove 14s linear infinite">
        <path d="M0 168 Q150 148 300 168 T600 168 T900 168 T1200 168 T1500 168 T1800 168 T2100 168 T2400 168 V200 H0Z" fill="url(#wave1)"/>
      </g>
    </g>
    <g>
      <g style="animation:waveMove 20s linear infinite reverse">
        <path d="M0 178 Q200 158 400 178 T800 178 T1200 178 T1600 178 T2000 178 T2400 178 V200 H0Z" fill="url(#wave2)"/>
      </g>
    </g>

    <!-- Textos -->
    <text
      x="600" y="98"
      text-anchor="middle"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="46"
      font-weight="700"
      fill="#ffff"
      class="name-text"
      letter-spacing="1"
    >Sofia Power</text>

    <!-- Separator dots -->
    <circle cx="392" cy="122" r="2" fill="#a78bfa" opacity="0.7"/>
    <circle cx="808" cy="122" r="2" fill="#67e8f9" opacity="0.7"/>

    <text
      x="600" y="128"
      text-anchor="middle"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="15"
      font-weight="400"
      fill="#cbd5e1"
      letter-spacing="3"
      opacity="0.88"
    >DESARROLLADORA FULL STACK  ·  PROGRAMACIÓN ORIENTADA A OBJETOS</text>

  </g>
</svg>